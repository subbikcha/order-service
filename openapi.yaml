openapi: 3.0.3
info:
  title: Order Service API
  description: Order Service API for managing food orders, pricing, and delivery tracking
  version: 1.0.0
  contact:
    name: Ripple Support
  license:
    name: Apache 2.0

servers:
  - url: http://localhost:8082
    description: Local development server

tags:
  - name: orders
    description: Order management endpoints

paths:
  /orders/{userId}:
    post:
      summary: Create an order for a user
      operationId: createOrder
      tags:
        - orders
      parameters:
        - name: userId
          in: path
          required: true
          description: The ID of the user placing the order
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderRequest'
      responses:
        '201':
          description: Order created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /orders:
    get:
      summary: List all orders
      operationId: listOrders
      tags:
        - orders
      responses:
        '200':
          description: List of all orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Order'

  /orders/stats:
    get:
      summary: Get order statistics
      operationId: getOrderStats
      tags:
        - orders
      responses:
        '200':
          description: Aggregated order statistics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderStats'

  /orders/{orderId}:
    get:
      summary: Get order by ID
      operationId: getOrder
      tags:
        - orders
      parameters:
        - name: orderId
          in: path
          required: true
          description: The unique order ID
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Order found successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '404':
          description: Order not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Delete an order
      operationId: deleteOrder
      tags:
        - orders
      parameters:
        - name: orderId
          in: path
          required: true
          description: The unique order ID
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Order deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '404':
          description: Order not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /orders/user/{userId}:
    get:
      summary: Get all orders for a user
      operationId: getUserOrders
      tags:
        - orders
      parameters:
        - name: userId
          in: path
          required: true
          description: The user ID to fetch orders for
          schema:
            type: string
      responses:
        '200':
          description: List of orders for the user
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Order'

  /orders/{orderId}/status:
    put:
      summary: Update order status
      operationId: updateOrderStatus
      tags:
        - orders
      parameters:
        - name: orderId
          in: path
          required: true
          description: The unique order ID
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateOrderStatusRequest'
      responses:
        '200':
          description: Order status updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '404':
          description: Order not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    Order:
      type: object
      description: A food order placed by a user
      properties:
        orderId:
          type: string
          format: uuid
          description: Unique identifier for the order
        userId:
          type: string
          description: ID of the user who placed the order
        userName:
          type: string
          description: Name of the user who placed the order
        tier:
          type: string
          description: User's membership tier at time of order
        totalAmount:
          type: integer
          description: Total item cost before discounts and delivery fee
        deliveryFee:
          type: integer
          description: Delivery fee applied to the order
        discountAmount:
          type: integer
          description: Reward points discount applied
          default: 0
        walletDiscount:
          type: integer
          description: Wallet balance discount applied
          default: 0
        finalAmount:
          type: integer
          description: Final amount charged after all discounts and fees
        status:
          $ref: '#/components/schemas/OrderStatus'
        restaurantName:
          type: string
          description: Name of the restaurant fulfilling the order
        deliveryAddress:
          type: string
          description: Delivery address for the order
        notes:
          type: string
          description: Optional delivery or order notes
        customerEmail:
          type: string
          format: email
          description: Customer's email address
        contactPhone:
          type: string
          description: Customer's contact phone number
        recommendedRestaurantHint:
          type: string
          description: Restaurant name from the user's active recommendation, if any
        matchedRecommendation:
          type: boolean
          description: Whether the order matched an active recommendation
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the order was created
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'
          description: List of items in the order
      required:
        - orderId
        - userId
        - status
        - items

    OrderItem:
      type: object
      description: A single item within an order
      properties:
        itemId:
          type: integer
          description: Unique identifier for the order item
        orderId:
          type: string
          description: ID of the parent order
        itemName:
          type: string
          description: Name of the menu item
        category:
          type: string
          description: Category of the menu item (e.g. pizza, burger)
        quantity:
          type: integer
          description: Quantity ordered
        unitPrice:
          type: number
          format: double
          description: Price per unit
      required:
        - itemName
        - quantity
        - unitPrice

    OrderStatus:
      type: string
      description: Current status of the order
      enum:
        - PENDING
        - CONFIRMED
        - PREPARING
        - OUT_FOR_DELIVERY
        - DELIVERED
        - CANCELLED

    CreateOrderRequest:
      type: object
      description: Request body to create a new order
      properties:
        deliveryAddress:
          type: string
          description: Address to deliver the order to
        restaurantName:
          type: string
          description: Name of the restaurant to order from
        notes:
          type: string
          description: Optional notes for the order or delivery
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItemRequest'
          description: Items to include in the order
      required:
        - deliveryAddress
        - restaurantName
        - items

    OrderItemRequest:
      type: object
      description: A single item to include in a new order
      properties:
        itemName:
          type: string
          description: Name of the menu item
        category:
          type: string
          description: Category of the menu item
        quantity:
          type: integer
          description: Quantity to order
        unitPrice:
          type: number
          format: double
          description: Price per unit
      required:
        - itemName
        - quantity
        - unitPrice

    UpdateOrderStatusRequest:
      type: object
      description: Request body to update the status of an order
      properties:
        status:
          $ref: '#/components/schemas/OrderStatus'
      required:
        - status

    OrderStats:
      type: object
      description: Aggregated statistics across all orders
      properties:
        totalOrders:
          type: integer
          description: Total number of orders
        deliveredOrders:
          type: integer
          description: Number of delivered orders
        pendingOrders:
          type: integer
          description: Number of pending orders
        cancelledOrders:
          type: integer
          description: Number of cancelled orders
        matchedRecommendations:
          type: integer
          description: Number of orders that matched a user recommendation
        totalRevenue:
          type: integer
          description: Total revenue from delivered orders
        totalWalletSavings:
          type: integer
          description: Total wallet discounts applied across all orders

    ErrorResponse:
      type: object
      description: Standard error response
      properties:
        timestamp:
          type: string
          format: date-time
          description: Time when the error occurred
        status:
          type: integer
          description: HTTP status code
        error:
          type: string
          description: Error type
        message:
          type: string
          description: Detailed error message
        path:
          type: string
          description: API endpoint path
      required:
        - status
        - message
